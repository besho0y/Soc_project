{% extends "layout.html"%}
{% block content %}
<div class="wrapper network-wrapper"><section>
    <img src="../static/images/pngwing.com.png" alt="Network Topology Diagram" class="Network-img">
  </section>

  <section>
    <h2>Configure Network</h2>
    <form class="network-form">
      <label for="protocol">Communication Protocol:</label>
      <select id="protocol" name="protocol">
        <option value="ethernet">Ethernet</option>
        <option value="wifi">Wi-Fi</option>
        <option value="bluetooth">Bluetooth</option>
      </select><br><br>

      <label for="bandwidth">Bandwidth (Mbps):</label>
      <input type="number" id="bandwidth" name="bandwidth"><br><br>

      <label for="latency">Latency (ms):</label>
      <input type="number" id="latency" name="latency"><br><br>

      <button type="submit">Apply Configuration</button>
    </form>
  </section></div>
{% endblock %}
