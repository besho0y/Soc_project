<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href="{{url_for('static',filename='main.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='main.js'></script>
</head>
<body>
    <header>
        <h1>Socademy</h1>
    </header>

    <main>
        <div class="menu">
            <div class="profile">
                <div class="imgbox">
                    <img src="../static/images/me.jpg" alt="Profile Image">
                </div>
                <span class="profile-name">Username</span>
            </div>

            <ul class="menu-list">
                <li><a href="{{url_for('home')}}"><i class="fas fa-home"></i><span>Home</span></a></li>
                <li><a href="{{url_for('scenario')}}"><i class="fas fa-bars"></i><span>Scenarios</span></a></li>
                <li><a href="{{url_for('network')}}"><i class="fas fa-diagram-project"></i><span>network</span></a></li>
                <li><a href="{{url_for('alerts')}}"><i class="fas fa-bell"></i><span>alerts</span></a></li>
                <li><a href="{{url_for('about')}}"><i class="fas fa-circle-exclamation"></i><span>about us</span></a></li>
                <li>
                    <div class="logout">
                        <a href="#"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
                    </div>
                </li>
            </ul>
        </div>

        <section >
                {% block content%}
                {% endblock %}
            </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    
</body>
</html>
